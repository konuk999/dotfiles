##### Core #####
set -g mouse on
set -g history-limit 100000
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi
set -sg escape-time 10

##### Prefix (Leader) #####
unbind C-b
set -g prefix C-a
bind C-a send-prefix

##### Better splits (and keep cwd) #####
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

##### Pane navigation (vim-like) #####
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

##### Pane resizing (repeatable) #####
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##### Quality of life #####
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"
bind x confirm-before -p "Kill pane? (y/n)" kill-pane

##### Status bar (clean) #####
set -g status-interval 3
set -g status-style "bg=default,fg=colour244"
set -g status-left-length 50
set -g status-right-length 100
set -g status-left "#[fg=colour39]#S #[fg=colour244]| "
set -g status-right "#[fg=colour244]%Y-%m-%d %H:%M #[fg=colour244]| #[fg=colour39]#(whoami)@#H "
setw -g window-status-current-style "fg=colour39,bold"
setw -g window-status-style "fg=colour244"
